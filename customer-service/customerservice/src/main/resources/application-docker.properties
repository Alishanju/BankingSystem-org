# final use: docker run -d --name <any-name> -p 8082:8081 -e SPRING_PROFILES_ACTIVE=docker -e DB_HOST=host.docker.internal -e REDIS_HOST=host.docker.internal -e RABBITMQ_HOST=host.docker.internal -e ZIPKIN_HOST=host.docker.internal customer-service:latest
server.port=8081

#################################################

# POSTGRES

#################################################

spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/customerdb
spring.datasource.username=postgres
spring.datasource.password=Sql@1234

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#################################################

# REDIS

#################################################

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=6379

#################################################

# RABBITMQ

#################################################

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

#################################################

# ZIPKIN

#################################################

management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST}:9411/api/v2/spans
