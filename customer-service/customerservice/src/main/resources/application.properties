spring.application.name=customerservice

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/customerdb

spring.datasource.username=postgres

spring.datasource.password=Sql@1234

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.root=INFO
logging.level.com.alisha=DEBUG

jwt.private-key=classpath:keys/private.pem
jwt.public-key=classpath:keys/public.pem

jwt.expiration=3600000


